# Build the Vite dashboard and publish it to GitHub Pages on every push to main.
# The dashboard JSONs under frontend/public/ are committed, so the site always
# serves the last committed data snapshot — no backend run happens in CI.
name: Deploy dashboard to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      # BASE_URL must match the repo name for project pages (user.github.io/<repo>/)
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: frontend
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
