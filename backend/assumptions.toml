# Fair Value — global assumption layer  (from VALUATION_DEFAULTS_SPEC §1)
# Version-controlled config, NOT constants buried in code. Read via stdlib tomllib.
# Resolution order (later overrides earlier): global -> archetype -> per-company (with source+date).

# Which universe the bare artifacts (output.json / ledger.json) default to (Plan A).
active_universe = "ndx"

[global]
equity_risk_premium  = 0.050    # Damodaran implied ERP (single most consequential input)
beta_default         = 1.00     # PLACEHOLDER until Blume-adjusted regression / Damodaran industry betas (Phase 3)
beta_floor           = 0.50
beta_cap             = 2.00
tax_rate             = 0.21     # FALLBACK only — effective rate from filings preferred (Plan 2)
tax_floor            = 0.10     # effective-rate clamp band (one-off benefits/charges distort)
tax_cap              = 0.35
cost_of_debt_spread  = 0.010    # Rd fallback = risk_free + spread when interest expense unmeasurable
cost_of_debt_cap     = 0.15     # Rd sanity cap (interest/debt explodes when debt shrank mid-year)
include_op_leases    = true     # leases count in RISK debt (leverage flag, ND/EBITDA) only —
                                # engine flows are post-rent, so leases in the EV bridge would double-count
terminal_growth      = 0.025    # hard ceiling = risk_free (enforced in code)
forecast_horizon     = 10       # years, 2-stage
stage1_years         = 5        # explicit; years 6-10 fade linearly to terminal_growth
initial_growth_cap   = 0.20
initial_growth_floor = 0.00
sbc_treatment        = "expense"  # Nasdaq-100 default: subtract SBC from FCF
min_wacc_minus_g     = 0.015    # clamp/skip when WACC - g is below this (TV explodes)

# risk_free is pulled LIVE from FRED DGS10 — never hardcoded. Fallback only if the fetch fails.
risk_free_fallback   = 0.043

# Live-screener universes (Plan A). Ingest builds the UNION of all of these once; each
# is scored/published separately. Add NYSE later as one more [[universe]] block (Plan D).
[[universe]]
id       = "ndx"
name     = "Nasdaq-100"
source   = "ndx"                # universe.py get_universe()
min_mcap  = 15e9                # smallest plausible member — below this, suspect share count

[[universe]]
id       = "sp500"
name     = "S&P 500"
source   = "sp500"              # universe.py sp500 constituents (Wikipedia)
min_mcap  = 3e9                 # S&P 500 floor is lower than the Nasdaq-100
