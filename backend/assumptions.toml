# SIC prefix -> GICS sector (Phase 4: NYSE). Layered lookup, most-specific wins:
# exact 4-digit > 3-digit > 2-digit prefix. DERIVED from the S&P union ground
# truth (1,513 names holding both Wikipedia GICS and EDGAR SIC): majority sector
# per prefix, finer entries kept only where they disagree with the parent.
# Measured on that ground truth: 88% exact sector, 97.2% ARCHETYPE (the number
# that gates engine routing). Applies ONLY to names with no GICS source (net-new
# NYSE); build_union lets GICS win for every S&P overlap name. Known soft spots:
# mortgage REITs (SIC 6798, GICS 2023 moved them to Financials) route to reit;
# hotel REITs share 7011 with hotel operators. 7389 services-NEC is hand-set to
