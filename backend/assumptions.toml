# Fair Value — global assumption layer  (from VALUATION_DEFAULTS_SPEC §1)
# Version-controlled config, NOT constants buried in code. Read via stdlib tomllib.
# Resolution order (later overrides earlier): global -> archetype -> per-company (with source+date).

# Which universe the bare artifacts (output.json / ledger.json) default to (Plan A).
active_universe = "ndx"

[global]
equity_risk_premium  = 0.050    # Damodaran implied ERP (single most consequential input)
beta_default         = 1.00     # per-name Blume-adjusted 5y betas are LIVE (betas.py); this is the
                                # fallback only when a name lacks ≥24 months of overlap for the regression
beta_floor           = 0.50
beta_cap             = 2.00
tax_rate             = 0.21     # FALLBACK only — effective rate from filings preferred (Plan 2)
tax_floor            = 0.10     # effective-rate clamp band (one-off benefits/charges distort)
tax_cap              = 0.35
cost_of_debt_spread  = 0.010    # Rd fallback = risk_free + spread when interest expense unmeasurable
cost_of_debt_cap     = 0.15     # Rd sanity cap (interest/debt explodes when debt shrank mid-year)
include_op_leases    = true     # leases count in RISK debt (leverage flag, ND/EBITDA) only —
                                # engine flows are post-rent, so leases in the EV bridge would double-count
terminal_growth      = 0.025    # hard ceiling = risk_free (enforced in code)
forecast_horizon     = 10       # years, 2-stage
stage1_years         = 5        # explicit; years 6-10 fade linearly to terminal_growth
initial_growth_cap   = 0.20
initial_growth_floor = 0.00
sbc_treatment        = "expense"  # Nasdaq-100 default: subtract SBC from FCF
min_wacc_minus_g     = 0.015    # clamp/skip when WACC - g is below this (TV explodes)

# Size premium added to Re (rf + beta·ERP + size_prem): [min_mcap, premium], largest
# threshold first, first one cleared wins. CRSP-decile size premia (Kroll/Duff & Phelps)
# scaled DOWN because beta already captures part of the small-cap effect — this is the
# INCREMENTAL premium. ~0 for the Nasdaq-100 (all mega/large); bites on the S&P 1500
# small/mid caps where the cross-sectional value evidence actually lives.
size_premium_bands   = [[10e9, 0.000], [2e9, 0.003], [0.5e9, 0.008], [0.0, 0.015]]

# Fair-value RANGE widening (display only — never touches mid, score, or confidence). Widens
# the HIGH of the range to at least mid·(1+band); the LOW stays at the real EPV/engine floor
# (never synthesized below the no-growth value). Band = quality (0–100) + cyclicality: business
# predictability, a SEPARATE axis from engine agreement (confidence). +10% for a pristine steady
# compounder → ~+50% upside band for a low-quality cyclical. Engine dispersion still wins when wider.
range_base_band      = 0.10     # floor uncertainty even for the best names
range_quality_scale  = 0.30     # the lowest-quality name adds up to ±30% more
range_cyclical_adder = 0.10     # cyclical revenue adds a further ±10%

# Tier 3 SCENARIO engine (Bear / Base / Bull). Base = the triangulated mid. Bull/Bear re-run
# the DCF with shifted drivers and scale the mid by the DCF's fundamental sensitivity; the
# shift magnitude scales 1×–3× with the per-name predictability band (a stable compounder gets
# a tight cone, a volatile cyclical a wide one). Bear is floored at the EPV no-growth value.
scenario_delta_growth = 0.015   # ±1.5pp stage-1 growth at the typical (band=base) name
scenario_delta_margin = 0.010   # ±1pp operating margin (shifts the NOPAT level; ROIC held)
scenario_delta_wacc   = 0.004   # ∓0.4pp WACC (bull discounts lower, bear higher)
scenario_scale_cap    = 2.0     # delta magnitude scales 1×–2.0× with the predictability band
scenario_bull_cap     = 1.65    # bull ≤ 1.65× base · bear ≥ bear_floor× base (DCF is convex —
scenario_bear_floor   = 0.55    #   an uncapped ratio yields absurd legs; caps keep the cone sane)
scenario_probs        = [0.25, 0.50, 0.25]   # bear / base / bull weights (sum = 1)
scenario_converge_yrs = 5       # horizon for the annualized (IRR-like) probability-weighted return

# risk_free is pulled LIVE from FRED DGS10 — never hardcoded. Fallback only if the fetch fails.
risk_free_fallback   = 0.043

# Live-screener universes (Plan A). Ingest builds the UNION of all of these once; each
# is scored/published separately.
[[universe]]
id       = "ndx"
name     = "Nasdaq-100"
source   = "ndx"                # universe.py get_universe()
min_mcap  = 15e9                # smallest plausible member — below this, suspect share count

[[universe]]
id       = "sp500"
name     = "S&P 500"
source   = "sp500"              # universe.py sp500 constituents (Wikipedia)
min_mcap  = 3e9                 # S&P 500 floor is lower than the Nasdaq-100

[[universe]]
id       = "sp1500"
name     = "S&P 1500"
source   = "sp1500"             # universe.py sp1500 = 500 ∪ 400 (mid) ∪ 600 (small)
min_mcap  = 0.3e9               # small-caps are legitimately ~$0.3-2B — below this the
                                # share count is suspect (this is a FLAG threshold, not a filter)
# Phase 3 (widen): the broad SCREENING universe. Mid/small caps are where cross-sectional
# value evidence is strongest and where the warranted sector anchors finally get
# statistical teeth. NO credible backtest here (delisted-price gap is worse for small
# caps — see [[delisted-price-gap]]); the forward ledger is its evidence. Backtest stays
# constituent-based on ndx/sp500 only.

[[universe]]
id       = "nyse"
name     = "NYSE $1B+"
source   = "nyse"               # universe.py: local SEC filers scan (no Wikipedia) —
                                # NYSE-listed · domestic 10-K filers · funds/SPACs/trusts out ·
                                # sector from [sector_by_sic] (GICS wins for S&P overlap names)
min_mcap  = 0.3e9               # FLAG threshold (same semantics as sp1500)
mcap_floor = 1e9                # MEMBERSHIP filter: junction admits only names with
                                # price×shares ≥ this at ingest (scope decision 2026-07-10:
                                # domestic ≥$1B now; ADRs deferred behind an ADR-ratio gate —
                                # EDGAR reports LOCAL share counts vs Yahoo ADR prices, so
                                # per-share values would be off 2-25× without ratio handling).
# Phase 4 (NYSE): screening-only like sp1500 — no backtest by design. The ~200 net-new
# names are what S&P criteria exclude: MLPs (EPD/ET/MPLX), loss-makers (SNOW),
# majority-held (SCCO), recent re-domiciliations (FERG/AMRZ) and IPOs.

# ---------------------------------------------------------------------------
# L5/L6 manual-override table (BLUEPRINT L1c promised this; Phase 1.3 delivers).
# Precedence everywhere: override > SIC map (Phase 2, bulk submissions.zip) > GICS sector.

[overrides.cik]
# Ticker→CIK pins. SEC's company_tickers.json follows a corporate shell the moment it
# REGISTERS: 2026-07 the XOM ticker moved to "ExxonMobil Holdings Corp" (CIK 2115436,
# a 1KB companyfacts member with ZERO facts) while the operating company's 19 years of
# filings stay on the old CIK until the new entity actually files. Pin the CIK that
# holds the facts; drop the pin once the successor's own filing history is usable.
# (Ingest prints a "ZERO-FACTS names" tripwire when a new case of this appears.)
XOM = "0000034088"

[overrides.archetype]
# CoStar: a data/software business GICS files under Real Estate — RIM-on-book
# priced it like a REIT (its +46 quality jump in v2.3 exposed the misroute).
CSGP = "standard"

[overrides.subsector]
